body:
  text: 元天竺俊辨大師唧𭊁銘得哩連得囉磨寧及譯主僧真智等譯敬禮一切最妙上師夫欲修習白傘蓋佛母者寂靜室內於軟穩氈上坐已然發願云為六道一切有情於輪回中令得解脫故願我成究竟正覺而發願已面前空中想白傘蓋佛會彼等處以真實心念三歸依已佛會消融為光融入自身自身成光然後念莎末斡呪想一切皆空於其空中華月輪上想白色唵字唵字放光其光復回字種變成白傘金柄柄上嚴唵字其字放光復回字種變成白傘蓋佛母一面二臂具三目金剛跏趺而坐右手作無怖畏印左手執白傘當胸嚴飾種種瓔珞身色潔白如雪山上日光明照具喜悅相顯無自性應觀如鏡中像然欲誦呪時自己心中蓮華日輪上唵字周圍繞心呪及長短總持等於彼放光遣除自他一切罪障及間斷等想已然後讀誦若疲倦時欲奉施食則面前置施食念唵啞吽三字呪攝受變成甘露面前空中召請白傘蓋佛母為首并二十二山冢所居陰母及七種佛并十方正覺三種具美淨梵帝釋伴繞等已想舌變成金剛光筒誦奉食呪曰唵薩㗚斡二合怛達遏哆烏室禰折席𭊁怛末嘚哩吽發怛𠵱擔末哩渴渴渴兮渴兮誦三遍或五遍已然誦讚歎禱祝求索願事等畢奉送佛會其施食棄於淨處回向善根矣啞呤耶怛達遏哆烏室禰折西𭊁引怛末嘚哩捺麻啞末囉唧怛𭊁囉禰梵語聖一切如來頂髻中出白傘蓋佛母餘無能敵總持敬禮最上三寶華言如是我聞一時出有壞住三十三天善法妙好諸天所居之處與大比丘并大菩提勇識及天主帝釋衆等集爾時出有壞坐蓮華座入於普觀頂髻三昧速然出有壞從頂髻中出現如是總持密呪法行敬禮正覺及一切菩提勇識敬禮正覺敬禮妙法敬禮大衆敬禮七俱胝真實究竟正覺及聲聞大衆等敬禮所有世間壞怨等敬禮所有預流等敬禮所有一來等敬禮所有不還等敬禮所有世間真實超越等敬禮所有入實者等敬禮天仙呪咀及有加祐力能等敬禮所有誦持明呪獲成就者等敬禮淨梵敬禮帝釋敬禮緊威具美能令退屈苦行之主者等敬禮具美嚴五手印無愛子之所歸敬處敬禮具美能摧壞三層宮城住於墓地之中一切陰母所歸敬處敬禮出有壞如來種佛敬禮蓮華種佛敬禮金剛種佛敬禮寶珠種佛敬禮大象種佛敬禮少童種佛敬禮龍種佛敬禮勇固部器械王佛敬禮無量光佛敬禮不動佛敬禮藥師琉璃光王佛敬禮娑羅主王華實圓滿佛敬禮釋迦牟尼佛敬禮寶上王佛敬禮最妙普賢佛敬禮衆明主佛敬禮目圓滿烏巴辣香上王佛彼等處敬禮已出有壞母一切如來頂髻中出白傘蓋佛母餘無能敵大回遮母以此決斷一切出者邪魔亦能決斷餘者一切明呪亦能回遮非時橫夭亦能令有情解脫一切繫縛亦能回遮一切憎嫌惡夢亦能摧壞八萬四千邪魔亦能歡悅二十八宿亦能折伏八大房宿亦能回遮一切冤讎亦能摧壞最極暴惡一切憎嫌惡夢亦能救度毒藥器械水火等難無有能敵大緊母大掇朴母大力母大熾然母大威力大白蓋母大力母熾然掛纓白衣母聖救度母具嗔皺勝勢金剛稱念珠蓮華昭明金剛名無有能敵具念珠金剛牆等摧壞母柔善佛等供養母柔相威力具大母聖救度母大力母不歿金剛鐵鋜母金剛少童持種母金剛手種金念珠大赤色及寶珠母種明金剛稱頂髻種相窈窕金剛母如金色光具眼母金剛燭及白色母蓮華眼及月光母手印聚彼等一切力故願令擁護於我擁護於我唵呤室遏捺不囉二合引折𭊁引也怛達遏哆烏室禰折席𭊁怛巴嘚哩二合吽𠹌隆二合拶沒末捺葛囉吽𠹌隆二合席怛沒末捺葛囉吽𠹌隆二合麻曷覓得也三合口末室渴捺葛囉吽𠹌隆二合撥囉覓能二合惹舌上三合口末室渴捺葛囉吽𠹌隆二合薩沒斡𬻅舌上室達捺能席擔沒末捺葛囉吽𠹌隆二合薩斡也室渴囉室渴薩屹囉曷捺覓得𭊁能薩捺葛囉吽𠹌隆二合拶𬻅囉室帝捺能屹囉曷薩曷悉囉覓𭊁能薩捺葛囉吽𠹌隆二合引啞室捺𠵴能折帝𭊁能捺色曷上腭引得得囉捺麻不囉薩怛捺葛囉吽𠹌隆二合引啞希怛捺麻麻渴屹囉曷捺能覓能捺能上腭薩捺葛囉吽𠹌隆二合引囉塞剋囉𪁪沒擁護於我出有壞母一切如來頂髻中出白傘蓋佛母金剛頂髻大回遮母具千大臂母有千大首母具十萬俱胝目不二熾燃具種相金剛寬廣大白母主宰三界中圍母一切時中擁護於我擁護於我唵國王難盜賊難火難水難毒藥難器械難外國軍兵難飢饉難冤讎難疾疫難霹靂難非時橫夭難地震動難星箭難國王刑罰難天難龍難閃電難飛空難惡獸忿怒難又復天魔龍魔非天魔風神魔飛空魔尋香魔疑神魔大腹行魔施礙魔夜叉魔餓鬼魔空行母魔食肉魔出者魔瓶袋魔臭魔身臭魔令枯瘦魔令忘魔令顛狂魔令魘寐魔令鎮伏魔奎宿魔彼等一切之中願我獲得安穩吉祥又奪威力鬼奪容顏鬼食産宮鬼飲血鬼食胞胎鬼食肉鬼食脂鬼食髓鬼食脂衣鬼取命鬼食嘔吐鬼食大便鬼食小便鬼食竅流鬼食殘鬼食唾鬼食涕鬼食涎鬼食膿鬼食施食鬼食鬘鬼食香氣鬼食香鬼奪意鬼食華鬼食果鬼食苗鬼食燒施鬼等之中願我獲得安穩吉祥彼等一切及一切魔所造明呪以此決斷將杵擊之遍遊行所造明呪以此決斷將杵擊之空行與空行母所造明呪以此決斷將杵擊之大獸主所造明呪以此決斷將杵擊之無愛子所造明呪以此決斷將杵擊之飛空及真實作等所造明呪以此決斷將杵擊之大黑及陰母等所造明呪以此決斷將杵擊之持人頭器所造明呪以此決斷將杵擊之令勝及作蜂蜜與令義昔成所造明呪以此決斷將杵擊之四姊妹所造明呪以此決斷將杵擊之卑上腭屹哩帝及喜主與集主等所造明呪以此決斷將杵擊之無善淨所造明呪以此決斷將杵擊之壞怨所造明呪以此決斷將杵擊之離欲所造明呪以此決斷將杵擊之密主金剛手所造明呪以此決斷將杵擊之敬禮出有壞母一切如來頂髻中出白傘蓋佛母擁護於我擁護於我唵啞席怛捺辣室渴不囉末悉不怛𠵴遏能塞𭊁怛末嘚哩二合𪢚辣𪢚辣渴𭊁渴𭊁𭊁囉𭊁囉覓𭊁覓𭊁秦能捺秦能捺覓能捺覓能捺吽吽發怛發怛莎曷馨馨發怛和和發怛啞母屹英發怛啞不囉帝曷怛發怛不囉末囉怛發怛啞須囉𠵴嘚囉末渴發怛薩㗚末帝併𦎨發怛薩㗚末併京𦎨發怛薩㗚末啞須哩𦎨發怛薩㗚末麻嚕寧𦎨發怛薩㗚末割嚕矴𦎨發怛薩㗚末葛能𭊁冷𠵴𦎨發怛薩㗚末悉屹哩二合捺冷𦎨發薩㗚末麻和囉寧𦎨發怛薩㗚末也塞輕𦎨發怛薩㗚末囉塞屹囉星𦎨發怛薩㗚末不哩矴𦎨發怛薩㗚末𠵴哳𡁔𦎨發怛薩㗚末母矴𦎨發怛薩㗚末孤能引末能引寧㗚發怛薩㗚末莫怛矴𦎨發怛薩㗚末葛怛布怛禰𦎨發怛薩㗚末廝葛能寧𦎨發怛薩㗚末烏能麻能寧𦎨發怛薩㗚末拶英𦎨發怛薩㗚末啞不塞麻哩𦎨發怛薩㗚末阿喉音重怛囉雞帝𦎨發怛薩㗚末𬻅冷辣上齶屹矴𦎨發怛薩㗚末𬻅冷併冷屹矴𦎨發怛薩㗚末撮哩𦎨發怛薩㗚末屹哩怛葛囉麻禰葛戈冷矴𦎨發怛屹囉捺併咄怛𦎨發怛唧嘚攃不囉折葛𬻅舌上攃冷帝矴𦎨發怛哆冷直布屹矴𦎨發怛薩㗚末帝哩提屹𦎨發怛薩㗚末室囉麻禰𦎨發怛薩㗚末𠵴得夜𭊁哩𦎨發怛拶耶葛囉麻𬻅舌上葛囉也𦎨發怛薩㗚末啞冷達薩怛京𦎨發怛覓𭊁舌上拶哩𦎨發怛拶𬻅冷滅舌上重末屹禰英𦎨發怛薩㗚末戈烏麻哩英𦎨發怛𠵴怛囉禰英𦎨發怛麻曷不囉怛上腭屹哩𦎨發怛末𠷌囉二合山上腭葛辣也不囉怛上腭屹囉囉拶也發怛麻曷葛辣也麻得哩葛捺捺麻塞屹哩怛英發怛𠵴折𭊁併英發怛不囉黑末禰也發怛啞屹愛禰英發怛麻曷葛哩英發怛葛辣𭊁能上腭帝英發怛𠵱能舌上嘚哩英發怛𠺘鳥得哩英發怛孤名哩英發怛不囉𠶹英發怛拶摩能帝英發怛囉嘚哩英發怛葛辣囉嘚哩英發怛耶麻怛能帝英發怛葛巴哩英發怛啞帝麼屹帝塞麻折捺末席捺英發怛凡有有情於我起憎嫌心等者起暴惡心等者能奪威力等者又復奪顏容鬼食産宮鬼等食血鬼等食凝脂鬼等食肉鬼等食脂鬼等食髓鬼等食胎衣鬼等取命鬼等食嘔吐鬼等食大便鬼等食小便鬼等食竅流鬼等食殘鬼等食涎鬼等食涕鬼等貪唾鬼等食膿鬼等食施食鬼等食鬘鬼等食香氣鬼等食香鬼等食華鬼等食果鬼等食苗鬼等食燒施鬼等具罪愆心者等具忌嫌心者等具暴惡心者等又復所有天魔等龍魔等非天魔等風神魔等飛空魔等尋香魔等疑神魔等大腹行魔等施礙魔等夜叉魔等餓鬼魔等食肉魔等出者魔等瓶袋魔等臭魔等身臭魔等令枯瘦魔等令顛狂魔等令厭魅魔等令忘魔等鎮伏魔等空行母魔等奎宿魔等獄帝魔等陰母令喜魔等遍遊行具瓔魔等拔剌魔等又復一日疫病亦所有二日病三日病四日病七日病恆常疫病無盡疫病瘌痛病出者依風起病依膽起病依痰起病依俱集起病一切疾病身病等願令遣除又復身分病不進飲食病眼病鼻病口病項頸病心病咽喉病耳病齒病心熱惱病腦病半肋病背節病腹病腰病穀道病腿股病脛病手病足病肢病衆肢病等願令遣除願令擁護大白傘蓋佛母金剛頂髻大回遮母以此十二由旬內出者起尸者空行母者又復疫病疥瘡癢瘡痘瘡癩瘡皴烈瘡痔瘡燒瘡疙癆瘡妙瘡又枯瘦恐怖病及寶毒及和合毒厭禱毒并火難水難又鬪爭結怨損害非時夭壽又復嘚哩二合麻布割蟲嘚哩辣怛蟲蝮蝎蚖蛇鼠狼獅子虎熊羆并熊狼水獸及猶如虻蠅取他性命彼等一切明呪悉皆繫縛一切威儀繫縛餘者一切明呪繫縛一切諸魔明呪悉皆願令繫縛怛得也達唵啞捺呤啞捺呤𠵴折得帝𠵴折得帝𠵴引囉末𠷌囉𭊁哩末上腭𭊁末𭊁末𠷌囉鉢禰發怛吽吽發怛發怛吽𠹌隆二合末捺發怛莎曷凡有行人以此一切如來頂髻中出白傘蓋佛母餘無能敵大回遮母或樺皮或白㲲或樹皮上書寫已或戴身上或項頸上則能直至終身以毒不能害以器械不能害以火不能焚以水不能漂以寶毒不能中以和毒不能害以呪毒不能壞非時夭壽不能侵一切冤魔及所有惡友等凡一切處為悅愛所愛敬也又能恆河沙俱胝八萬四千金剛種等亦擁護亦救護亦覆護彼等作悅意所愛敬之又能八萬四千大劫之中得宿命智又世世生處不受施礙羅剎餓鬼臭及身臭等身又不受人中貧窮之身又具足無量無數恆河沙數正覺出有壞之福祿也又能一切如來頂髻中出白傘蓋佛母餘無能敵大回遮母恆受持則不行梵行亦成梵行不能忍則亦能成忍不清淨則亦為清淨無近住戒得近住戒不持齊戒亦成齊戒設爾所造五無間罪則能清淨無餘往昔業障悉皆消滅若欲女人求子則能受持一切如來頂髻中出白傘蓋佛母餘無能敵大回遮母者獲得具足壽命福德威力之子命終之後往生極樂世界又人病牛病畜病疫病及損害及惹病礙及鬪戰餘他一切軍兵之中則能以此一切如來頂髻中出白傘蓋佛母餘無能敵大回遮母安置於幢頂上作廣大供養已將幢置大城門上或宮宅之中或村坊之中或聚落之中或川原之中或寂靜之處於餘無能敵大回遮母處作廣大供養則能速然國界安寧亦能柔善疫病礙與損害鬪爭餘他一切軍兵也末𠷌囉鉢禰遣魔擁護呪寧引得也達唵室哆沒末上腭𭊁末上腭𭊁擁護於我擁護於我莎曷室渴囉室渴麻沒唵吽室哆沒末能𭊁末能𭊁末𠷌囉二合擁護於我囉室渴囉室渴麻沒末𠷌囉末禰英吽發怛莎曷恆常持心呪唵薩㗚末怛達遏哆烏室禰折啞斡浪屹帝摩冷𭊁叮𡁧囉室禰唵𪢚辣𪢚辣𭊁渴𭊁渴𭊁囉𭊁囉覓能𭊁囉覓能𭊁囉秦𭊁秦𭊁覓沒𭊁覓沒𭊁吽吽發怛發怛莎曷增長身親心呪唵薩㗚末怛達遏哆烏室禰折吽發怛發怛莎曷攝受呪寧得也達唵啞捺令啞捺令渴薩銘渴薩銘𠵴引囉𠵴引囉星烏禰榮切身星上同薩㗚末莫𭊁啞溺室達捺啞溺室提矴薩㗚末怛達遏哆烏室禰折席怛怛末嘚哩吽發怛莎曷堅甲呪吽麻麻吽禰莎曷應作明滿修習彼所有龍王等依時降雨矣正覺與菩提勇識天及非天并人與尋香一切世間等皆大歡喜出有壞所說之處現前讚揚大白傘蓋佛母總讚歎禱祝偈唵蓮華月輪妙座上金剛跏趺身色白左手當胸執白蓋具白傘處稱讚禮右手結於無畏印喜笑及身具窈窕一切正覺所攝受佛母汝處稱讚禮一切所伏有情處隨類化現種種身大寶莊嚴極美妙悅意母處稱讚禮唵無有能敵大緊母大掇朴母大力母大熾然母大威母大白蓋母大力母熾然掛纓白衣母聖救度母大嗔皺聖世金剛稱念珠蓮華昭明金剛名無有能敵具念珠金剛牆等摧壞母柔善佛等供養母柔相威力具大母聖救度母大力母不歿金剛鐵鋜母金剛少童持種母金剛手種金念珠大赤色及寶珠母種明金剛稱頂髻種相窈窕金剛母如金色光具眼母金剛燭及白色母蓮華目及月光母手印聚處稱讚禮出有壞母白蓋母釋迦頂髻中出母金剛頂髻回遮母千臂千手大具母大俱胝之具眼母不二熾燃具種相金剛廣博大白母主宰三界中圍母最極於我求擁護最極於我乞覆護唵國王賊怖水火毒器械飢饉邪魔疾霹靂非時并夭壽地震國王刑罰等閃電飛空諸怖散惡獸虎等大難中一切時中乞覆護其天魔等諸魔礙能奪威力并餓鬼風膽痰等大病中一切時中乞覆護貪癡嗔等諸煩惱十不善業五無間所遮自性罪業等惡趣苦果怖畏中愚資我今求覆護以大慈悲之鐵鉤猶如愛子乞護持一切時中擁護我大白傘蓋總持讚歎禱祝偈竟
